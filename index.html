<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XY's Repo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 0 20px;
            text-align: center;
            background: #f2f2f7;
        }
        h1 {
            font-size: 32px;
            color: #007aff;
        }
        p {
            font-size: 17px;
            color: #333;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            margin: 10px;
            background: #007aff;
            color: white;
            font-size: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }
        code {
            background: #e5e5ea;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>XY's Repo</h1>
    <p>iOS 越狱软件源</p>
    <p>源地址：<code>https://may-20th.github.io/repo/</code></p>

    <button class="btn" onclick="copyRepo()">
        📋 一键复制源地址
    </button>

    <p style="margin-top: 20px; font-size: 15px; color: #666;">
        复制后打开 Sileo → 软件源 → 点击右上角 + → 粘贴地址即可添加
    </p>

    <script>
        function copyRepo() {
            navigator.clipboard.writeText('https://may-20th.github.io/repo/');
            alert('✅ 源地址已复制！请打开 Sileo 粘贴添加');
        }
    </script>
</body>
</html>
